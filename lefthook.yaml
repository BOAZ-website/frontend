pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm lint

    format:
      glob: '*.{js,ts,jsx,tsx,json,yaml,yml,md}'
      run: pnpm format
      stage_fixed: true
    
    stylelint:
      glob: '*.{css,css.ts,css.tsx}'
      run: pnpm lint:css

pre-push:
  commands:
    type-check:
      run: pnpm check-types

commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm exec tsx commitlint.config.ts {1}
