name: git push into another repo to deploy to vercel

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Build project
        run: sh ./build.sh

      - name: Pushes to another repository
        uses: cpina/github-action-push-to-another-repository@v1.7.3
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: 'output'
          destination-github-username: yooncandooit
          destination-repository-name: boaz-web-deploy
          user-email: ${{ secrets.EMAIL }}
          commit-message: ${{ github.event.head_commit.message || 'Auto commit from GitHub Actions' }}
          target-branch: main
